services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/tasks.db
      - PORT=3001
      - ADMIN_PIN=1234
      # Microsoft To-Do integration (optional)
      # Register a free app at https://portal.azure.com → Entra ID → App registrations
      # Account type: Personal Microsoft accounts only | Platform: Web | Redirect URI: {APP_URL}/api/todo/callback
      # Required permissions: Tasks.ReadWrite, User.Read (delegated)
      #- MICROSOFT_CLIENT_ID=your-client-id-here
      #- MICROSOFT_CLIENT_SECRET=your-client-secret-here
      #- APP_URL=http://your-server-address:3001
    volumes:
      - task-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  task-data:
